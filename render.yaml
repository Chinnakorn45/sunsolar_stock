services:
  - type: web
    name: solar-stock-backend
    env: node
    region: singapore
    plan: free
    buildCommand: cd backend && npm ci
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "5000"
      - key: DATABASE_URL
        scope: all
      - key: CLOUDINARY_CLOUD_NAME
        scope: all
      - key: CLOUDINARY_API_KEY
        scope: all
      - key: CLOUDINARY_API_SECRET
        scope: all
