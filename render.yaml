services:
  - type: web
    name: solar-stock-backend
    env: node
    region: singapore
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: PORT
        value: "5000"
      - key: DATABASE_URL
        fromDatabase:
          name: solar-stock-db
          property: connectionString
      - key: CLOUDINARY_CLOUD_NAME
        scope: all
      - key: CLOUDINARY_API_KEY
        scope: all
      - key: CLOUDINARY_API_SECRET
        scope: all

databases:
  - name: solar-stock-db
    databaseName: solar_stock
    user: solar_user
    region: singapore
    plan: free
