# =============================================
# Docker Compose — Solar Stock Management System
# Development Environment (hot-reload)
# =============================================

services:
  # --- PostgreSQL Database ---
  db:
    image: postgres:16-alpine
    container_name: solar-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      POSTGRES_DB: ${POSTGRES_DB:-solar_stock}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-solar_stock}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Backend (Express API) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: solar-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-123456}@db:5432/${POSTGRES_DB:-solar_stock}
    volumes:
      - ./backend/src:/app/src
      - ./backend/seed.js:/app/seed.js
      - ./backend/seed-technicians.js:/app/seed-technicians.js
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  # --- Frontend (Vite + React) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: solar-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html

  # --- Nginx Reverse Proxy ---
  nginx:
    image: nginx:alpine
    container_name: solar-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

  # --- Adminer (Database Management UI) ---
  adminer:
    image: adminer:latest
    container_name: solar-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local
