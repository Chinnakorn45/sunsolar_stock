# =============================================
# Docker Compose — Production Override
# ใช้: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =============================================

services:
  backend:
    build:
      target: production
    environment:
      NODE_ENV: production
    volumes:
      - uploads:/app/uploads
    # ไม่ mount source code ใน production

  frontend:
    build:
      target: production

  nginx:
    volumes:
      - ./nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
